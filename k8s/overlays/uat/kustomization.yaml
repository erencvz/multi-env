apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multi-env-uat

resources:
- ../../base

patches:
- path: service-patch.yaml

configMapGenerator:
- literals:
  - ENVIRONMENT=uat
  name: multi-env-api-env

images:
- name: apinizeren/multi-env
  newName: apinizeren/multi-env
  newTag: v0.0.9
