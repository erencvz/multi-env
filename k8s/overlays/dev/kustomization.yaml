apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: multi-env-dev

resources:
  - ../../base

patches:
  - path: service-patch.yaml

configMapGenerator:
  - name: multi-env-api-env
    literals:
      - ENVIRONMENT=dev

images:
  - name: apinizeren/multi-env
    newTag: latest
